<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ET Classic Monthly Water Bill</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --primary: #1a4a8a;
    --primary-light: #2563b0;
    --primary-dark: #0f2f5c;
    --accent: #0ea5e9;
    --accent-light: #e0f2fe;
    --success: #16a34a;
    --success-light: #dcfce7;
    --danger: #dc2626;
    --danger-light: #fee2e2;
    --warning: #d97706;
    --warning-light: #fef3c7;
    --text: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --bg: #f0f6ff;
    --card: #ffffff;
    --shadow: 0 4px 24px rgba(26,74,138,0.10);
    --shadow-lg: 0 8px 40px rgba(26,74,138,0.16);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 60%, var(--primary-light) 100%);
    color: white;
    padding: 0 2rem;
    box-shadow: var(--shadow-lg);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 70px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.45rem;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }
  .header h1 span.drop { font-size: 1.6rem; }

  /* ── Tabs ── */
  .tabs-bar {
    background: white;
    border-bottom: 2px solid var(--border);
    padding: 0 2rem;
  }
  .tabs-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    gap: 0;
  }
  .tab-btn {
    padding: 1rem 2rem;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }
  .tab-btn.active {
    color: var(--primary);
    border-bottom-color: var(--primary);
    font-weight: 600;
  }
  .tab-btn:hover:not(.active) { color: var(--primary-light); }

  /* ── Main ── */
  .main { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Top action bar ── */
  .action-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
    gap: 0.75rem;
  }
  .month-badge {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--primary);
    font-weight: 600;
  }
  .btn-group { display: flex; gap: 0.6rem; flex-wrap: wrap; }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.55rem 1.2rem;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.18s;
    text-decoration: none;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(26,74,138,0.3); }
  .btn-accent { background: var(--accent); color: white; }
  .btn-accent:hover { background: #0284c7; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(14,165,233,0.3); }
  .btn-success { background: var(--success); color: white; }
  .btn-success:hover { background: #15803d; transform: translateY(-1px); }
  .btn-outline {
    background: white;
    color: var(--primary);
    border: 1.5px solid var(--primary);
  }
  .btn-outline:hover { background: var(--accent-light); }
  .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #b91c1c; }

  /* ── Table card ── */
  .table-card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .table-wrap { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
  thead tr { background: linear-gradient(90deg, var(--primary-dark), var(--primary)); }
  thead th {
    padding: 0.9rem 0.85rem;
    color: white;
    font-weight: 600;
    text-align: left;
    white-space: nowrap;
    font-size: 0.8rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #f8faff; }
  td { padding: 0.75rem 0.85rem; vertical-align: middle; }

  /* ── Reading cell ── */
  .reading-cell { cursor: pointer; }
  .reading-display {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .reading-value {
    font-weight: 600;
    color: var(--primary);
  }
  .edit-hint {
    font-size: 0.7rem;
    color: var(--text-muted);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .reading-cell:hover .edit-hint { opacity: 1; }
  .reading-input-group {
    display: none;
    align-items: center;
    gap: 4px;
  }
  .reading-input {
    width: 110px;
    padding: 0.3rem 0.5rem;
    border: 2px solid var(--primary);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--primary);
    outline: none;
  }
  .icon-btn {
    width: 28px; height: 28px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem;
    transition: all 0.15s;
  }
  .icon-btn-save { background: var(--success); color: white; }
  .icon-btn-save:hover { background: #15803d; }
  .icon-btn-cancel { background: #e2e8f0; color: var(--text-muted); }
  .icon-btn-cancel:hover { background: #cbd5e1; }

  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Badges ── */
  .badge {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.03em;
  }
  .badge-zero { background: #f1f5f9; color: var(--text-muted); }
  .badge-value { background: var(--accent-light); color: var(--primary); }
  .badge-fresh { background: var(--warning-light); color: var(--warning); }

  /* ── Stats bar ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
    margin-bottom: 1.2rem;
  }
  .stat-card {
    background: white;
    border-radius: 12px;
    padding: 1rem 1.2rem;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(26,74,138,0.06);
  }
  .stat-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; }
  .stat-value { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--primary); margin-top: 0.2rem; }

  /* ── Toast ── */
  .toast-container { position: fixed; top: 1.2rem; right: 1.2rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
  .toast {
    padding: 0.75rem 1.2rem;
    border-radius: 10px;
    color: white;
    font-size: 0.875rem;
    font-weight: 500;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    animation: slideIn 0.3s ease;
    display: flex; align-items: center; gap: 0.5rem;
  }
  @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .toast-success { background: var(--success); }
  .toast-danger { background: var(--danger); }
  .toast-info { background: var(--primary); }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(15,47,92,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white;
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    width: 100%;
    max-width: 640px;
    max-height: 85vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-header {
    padding: 1.2rem 1.5rem;
    background: linear-gradient(90deg, var(--primary-dark), var(--primary));
    color: white;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
  .modal-close {
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    transition: background 0.2s;
  }
  .modal-close:hover { background: rgba(255,255,255,0.35); }
  .modal-body { padding: 1.2rem 1.5rem; overflow-y: auto; flex: 1; }

  /* Past readings table in modal */
  .past-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .past-table th {
    background: var(--accent-light);
    color: var(--primary);
    padding: 0.6rem 0.75rem;
    text-align: left;
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
  }
  .past-table td { padding: 0.65rem 0.75rem; border-bottom: 1px solid var(--border); }
  .past-table tr:last-child td { border-bottom: none; }
  .past-table tr:hover td { background: #f8faff; }
  .no-data { text-align: center; padding: 2rem; color: var(--text-muted); font-style: italic; }

  /* ── Flats Management Tab ── */
  .flats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1rem;
  }
  .flat-card {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(26,74,138,0.06);
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .flat-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
  .flat-card-header {
    background: linear-gradient(90deg, var(--primary-dark), var(--primary));
    color: white;
    padding: 0.75rem 1rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .flat-number { font-family: 'Playfair Display', serif; font-size: 1.1rem; }
  .flat-card-body { padding: 0.9rem 1rem; }
  .flat-info-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.45rem; font-size: 0.85rem; color: var(--text-muted); }
  .flat-info-row strong { color: var(--text); }
  .flat-info-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); font-weight: 600; margin-top: 0.6rem; margin-bottom: 0.15rem; }

  /* Inline edit for tenant */
  .tenant-edit-row { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.5rem; }
  .tenant-input {
    flex: 1;
    padding: 0.3rem 0.5rem;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .tenant-input:focus { border-color: var(--primary); }

  /* ── Search bar ── */
  .search-bar {
    display: flex; gap: 0.75rem; margin-bottom: 1.2rem; flex-wrap: wrap; align-items: center;
  }
  .search-input {
    flex: 1; min-width: 200px;
    padding: 0.55rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.875rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--primary); }

  /* ── Loading overlay ── */
  .loading { text-align: center; padding: 3rem 1rem; color: var(--text-muted); }
  .loading-spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .header-inner { height: 56px; }
    .header h1 { font-size: 1rem; }
    .main { padding: 1rem; }
    .tab-btn { padding: 0.75rem 1rem; font-size: 0.85rem; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .flats-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <h1><span class="drop">💧</span> ET Classic Monthly Water Bill</h1>
    <div style="font-size:0.78rem;opacity:0.7;" id="headerDate"></div>
  </div>
</header>

<!-- Tabs -->
<div class="tabs-bar">
  <div class="tabs-inner">
    <button class="tab-btn active" onclick="switchTab('readings')">📊 Meter Readings</button>
    <button class="tab-btn" onclick="switchTab('flats')">🏢 Flats Management</button>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- ═══════════════ TAB 1: READINGS ═══════════════ -->
  <div class="tab-panel active" id="tab-readings">

    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-card">
        <div class="stat-label">Total Flats</div>
        <div class="stat-value" id="statTotal">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Readings Entered</div>
        <div class="stat-value" id="statEntered">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Pending</div>
        <div class="stat-value" id="statPending">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Charges (₹)</div>
        <div class="stat-value" id="statCharges">—</div>
      </div>
    </div>

    <!-- Action bar -->
    <div class="action-bar">
      <div class="month-badge" id="monthBadge">—</div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateBill()">📄 Generate Bill</button>
        <button class="btn btn-accent" onclick="generateCSV()">📥 Generate CSV</button>
      </div>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-wrap">
        <table id="readingsTable">
          <thead>
            <tr>
              <th>Flat #</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Reading Date</th>
              <th>Reading <small style="font-weight:400;opacity:0.75">(click to edit)</small></th>
              <th>Consumption</th>
              <th>Charges (₹)</th>
              <th>History</th>
            </tr>
          </thead>
          <tbody id="readingsBody">
            <tr><td colspan="8"><div class="loading"><div class="loading-spinner"></div>Loading readings…</div></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ═══════════════ TAB 2: FLATS ═══════════════ -->
  <div class="tab-panel" id="tab-flats">
    <div class="search-bar">
      <input class="search-input" id="flatSearch" placeholder="🔍  Search by flat number or owner name…" oninput="filterFlats()"/>
      <span style="font-size:0.85rem;color:var(--text-muted)" id="flatCount"></span>
    </div>
    <div class="flats-grid" id="flatsGrid">
      <div class="loading"><div class="loading-spinner"></div>Loading flats…</div>
    </div>
  </div>
</div>

<!-- ══ Past Readings Modal ══ -->
<div class="modal-overlay" id="pastModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="pastModalTitle">Past Readings</h3>
      <button class="modal-close" onclick="closePastModal()">✕</button>
    </div>
    <div class="modal-body">
      <div id="pastModalContent"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// CONFIG — change BASE_URL if your Spring Boot runs on a different port
// ══════════════════════════════════════════════════════
const BASE_URL = 'http://localhost:8080';

// ══ State ══
let allReadings = [];
let allFlats    = [];

// ══ Init ══
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  document.getElementById('headerDate').textContent =
    now.toLocaleDateString('en-IN', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  document.getElementById('monthBadge').textContent =
    now.toLocaleDateString('en-IN', { month:'long', year:'numeric' }) + ' — Readings';
  loadReadings();
  loadFlats();
});

// ══════════════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════════════
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0 && tab==='readings') || (i===1 && tab==='flats')));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
}

// ══════════════════════════════════════════════════════
// READINGS — LOAD
// ══════════════════════════════════════════════════════
async function loadReadings() {
  try {
    const res = await fetch(`${BASE_URL}/api/readings/current-month`);
    if (!res.ok) throw new Error('API error ' + res.status);
    allReadings = await res.json();
    renderReadings();
    updateStats();
  } catch(e) {
    document.getElementById('readingsBody').innerHTML =
      `<tr><td colspan="8"><div class="loading" style="color:var(--danger)">⚠️ Could not load readings. Is Spring Boot running?<br><small>${e.message}</small></div></td></tr>`;
  }
}

function renderReadings() {
  const tbody = document.getElementById('readingsBody');
  tbody.innerHTML = '';

  // Merge flat owner/tenant name info into readings
  allReadings.forEach(item => {
    const flat = allFlats.find(f => f.flatNumber === item.flatNumber);
    const displayName  = flat ? (flat.tenantName  || flat.ownerName)  : item.flatNumber;
    const displayPhone = flat ? (flat.tenantPhone || flat.ownerPhone) : '—';

    const isFresh = item.id === null || item.id === undefined;
    const readingDate = isFresh
      ? new Date().toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })
      : new Date(item.readingDate).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' });

    const tr = document.createElement('tr');
    tr.dataset.id          = item.id ?? 'null';
    tr.dataset.flatNumber  = item.flatNumber;
    tr.dataset.name        = displayName;
    tr.dataset.phone       = displayPhone;

    tr.innerHTML = `
      <td><strong style="color:var(--primary)">${item.flatNumber}</strong></td>
      <td>${displayName}</td>
      <td style="color:var(--text-muted);font-size:0.82rem">${displayPhone}</td>
      <td style="color:var(--text-muted);font-size:0.82rem">
        ${isFresh ? `<span class="badge badge-fresh">New</span>` : readingDate}
      </td>
      <td class="reading-cell"
          data-id="${item.id ?? 'null'}"
          data-flat="${item.flatNumber}"
          data-name="${displayName}"
          data-phone="${displayPhone}">
        <div class="reading-display">
          <span class="reading-value">${item.reading ?? 0}</span>
          <span class="edit-hint">✏️ edit</span>
        </div>
        <div class="reading-input-group">
          <input type="number" class="reading-input" value="${item.reading ?? 0}" min="0"/>
          <button class="icon-btn icon-btn-save save-btn" title="Save">✔</button>
          <button class="icon-btn icon-btn-cancel cancel-btn" title="Cancel">✖</button>
          <div class="spinner"></div>
        </div>
      </td>
      <td class="consumption-cell">
        <span class="${item.consumption ? 'badge badge-value' : 'badge badge-zero'}">${item.consumption ?? 0}</span>
      </td>
      <td class="charges-cell">
        <strong style="color:${item.charges ? 'var(--success)' : 'var(--text-muted)'}">
          ${item.charges ? '₹' + item.charges.toFixed(2) : '₹0.00'}
        </strong>
      </td>
      <td>
        <button class="btn btn-outline btn-sm" onclick="openPastReadings('${item.flatNumber}', '${displayName}')">
          📋 Past
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });

  attachReadingEvents();
}

function updateStats() {
  const total    = allReadings.length;
  const entered  = allReadings.filter(r => r.id !== null && r.id !== undefined).length;
  const pending  = total - entered;
  const charges  = allReadings.reduce((s,r) => s + (r.charges || 0), 0);

  document.getElementById('statTotal').textContent   = total;
  document.getElementById('statEntered').textContent = entered;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statCharges').textContent = '₹' + charges.toFixed(0);
}

// ══════════════════════════════════════════════════════
// READING — INLINE EDIT
// ══════════════════════════════════════════════════════
function attachReadingEvents() {
  document.querySelectorAll('.reading-cell').forEach(cell => {
    cell.querySelector('.reading-display').addEventListener('click', () => enterEdit(cell));
    cell.querySelector('.save-btn').addEventListener('click',   () => saveReading(cell.closest('tr')));
    cell.querySelector('.cancel-btn').addEventListener('click', () => exitEdit(cell));
    cell.querySelector('.reading-input').addEventListener('keydown', e => {
      if (e.key === 'Enter')  saveReading(cell.closest('tr'));
      if (e.key === 'Escape') exitEdit(cell);
    });
  });
}

function enterEdit(cell) {
  cell.querySelector('.reading-display').style.display = 'none';
  cell.querySelector('.reading-input-group').style.display = 'flex';
  cell.querySelector('.reading-input').focus();
}
function exitEdit(cell) {
  const orig = cell.querySelector('.reading-value').textContent.trim();
  cell.querySelector('.reading-input').value = orig;
  cell.querySelector('.reading-display').style.display = 'flex';
  cell.querySelector('.reading-input-group').style.display = 'none';
}

async function saveReading(row) {
  const cell       = row.querySelector('.reading-cell');
  const id         = cell.dataset.id;
  const input      = cell.querySelector('.reading-input');
  const newVal     = input.value.trim();
  const spinner    = cell.querySelector('.spinner');
  const saveBtn    = cell.querySelector('.save-btn');

  if (newVal === '' || isNaN(newVal)) { showToast('Enter a valid reading value.', 'danger'); return; }

  spinner.style.display = 'inline-block';
  saveBtn.disabled = true;

  try {
    let url, body;
    if (id && id !== 'null') {
      url  = `${BASE_URL}/api/readings`;
      body = JSON.stringify({ id: parseInt(id), reading: parseFloat(newVal) });
      var method = 'PUT';
    } else {
      url  = `${BASE_URL}/api/readings`;
      body = JSON.stringify({ flatNumber: cell.dataset.flat, reading: parseFloat(newVal) });
      var method = 'POST';
    }

    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body
    });
    if (!res.ok) throw new Error('Server error ' + res.status);
    const result = await res.json();

    // Update reading value display
    cell.querySelector('.reading-value').textContent = newVal;

    // Update consumption cell
    const consCell = row.querySelector('.consumption-cell');
    consCell.innerHTML = `<span class="badge badge-value">${result.consumption}</span>`;

    // Update charges cell
    const chargeCell = row.querySelector('.charges-cell');
    chargeCell.innerHTML = `<strong style="color:var(--success)">₹${parseFloat(result.charges).toFixed(2)}</strong>`;

    // Stamp new id if created
    if (result.id) {
      cell.dataset.id = result.id;
      row.dataset.id  = result.id;
    }

    // Update local state
    const idx = allReadings.findIndex(r => r.flatNumber === cell.dataset.flat);
    if (idx !== -1) {
      allReadings[idx].reading     = parseFloat(newVal);
      allReadings[idx].consumption = result.consumption;
      allReadings[idx].charges     = result.charges;
      allReadings[idx].id          = result.id || allReadings[idx].id;
    }

    exitEdit(cell);
    updateStats();
    showToast(`✅ Reading saved for ${cell.dataset.flat}`, 'success');

  } catch(e) {
    showToast('❌ Failed to save: ' + e.message, 'danger');
  } finally {
    spinner.style.display = 'none';
    saveBtn.disabled = false;
  }
}

// ══════════════════════════════════════════════════════
// PAST READINGS MODAL
// ══════════════════════════════════════════════════════
async function openPastReadings(flatNumber, name) {
  document.getElementById('pastModalTitle').textContent = `📋 Past Readings — ${flatNumber} (${name})`;
  document.getElementById('pastModalContent').innerHTML = '<div class="loading"><div class="loading-spinner"></div>Loading…</div>';
  document.getElementById('pastModal').classList.add('open');

  try {
    const res = await fetch(`${BASE_URL}/api/readings/flat/${flatNumber}`);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();

    if (!data.length) {
      document.getElementById('pastModalContent').innerHTML = '<div class="no-data">No past readings found for this flat.</div>';
      return;
    }

    const rows = data.map(r => `
      <tr>
        <td>${new Date(r.readingDate).toLocaleDateString('en-IN', { day:'2-digit', month:'short', year:'numeric' })}</td>
        <td><strong style="color:var(--primary)">${r.reading ?? 0}</strong></td>
        <td><span class="badge badge-value">${r.consumption ?? 0}</span></td>
        <td><strong style="color:var(--success)">₹${r.charges ? parseFloat(r.charges).toFixed(2) : '0.00'}</strong></td>
        <td style="color:var(--text-muted);font-size:0.78rem">${r.updatedAt ? new Date(r.updatedAt).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—'}</td>
      </tr>
    `).join('');

    document.getElementById('pastModalContent').innerHTML = `
      <table class="past-table">
        <thead>
          <tr>
            <th>Reading Date</th>
            <th>Reading</th>
            <th>Consumption</th>
            <th>Charges</th>
            <th>Updated</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;
  } catch(e) {
    document.getElementById('pastModalContent').innerHTML = `<div class="no-data" style="color:var(--danger)">Error loading data.</div>`;
  }
}

function closePastModal() {
  document.getElementById('pastModal').classList.remove('open');
}
document.getElementById('pastModal').addEventListener('click', e => {
  if (e.target === document.getElementById('pastModal')) closePastModal();
});

// ══════════════════════════════════════════════════════
// GENERATE BILL (text file)
// ══════════════════════════════════════════════════════
async function generateBill() {
  if (!allReadings.length) { showToast('No readings loaded.', 'danger'); return; }

  // Fetch previous month readings to get prev reading
  let prevReadings = [];
  try {
    const res = await fetch(`${BASE_URL}/api/readings/current-month`);
    // We use allReadings consumption to back-calculate prev reading
  } catch(e) {}

  const dueDate = getDueDate();
  const lines   = [];

  allReadings.forEach(item => {
    const flat        = allFlats.find(f => f.flatNumber === item.flatNumber);
    const name        = flat ? (flat.tenantName || flat.ownerName) : item.flatNumber;
    const currReading = item.reading    || 0;
    const consumption = item.consumption || 0;
    const prevReading = currReading - consumption;
    const charges     = item.charges    || 0;
    const finalCharges = charges + 1500;

    // Break down charges into base + extra
    const base  = Math.min(consumption, 20000) * 0.015;
    const extra = (charges - base) + 1500;
    lines.push(`Name & Flat # : ${name} ${item.flatNumber}`);
    lines.push(`Reading(Curr,Prev,Difference): ${currReading}, ${prevReading}, ${consumption} Liters`);
    lines.push(`Amount Payable: Rs.${finalCharges.toFixed(2)}/- (${base.toFixed(2)} + ${Math.max(0,extra).toFixed(2)})`);
    lines.push(`Note: Please pay your amount before ${dueDate} to avoid penalty.`);
    lines.push('');
    lines.push('─'.repeat(60));
    lines.push('');
  });

  downloadFile(lines.join('\n'), `water-bill-${getCurrentMonthStr()}.txt`, 'text/plain');
  showToast('📄 Bill generated!', 'success');
}

// ══════════════════════════════════════════════════════
// GENERATE CSV
// ══════════════════════════════════════════════════════
function generateCSV() {
  if (!allReadings.length) { showToast('No readings loaded.', 'danger'); return; }

  const header = ['flat_number', 'name', 'phone', 'pres_reading', 'prev_reading', 'consumption', 'charges'];
  const rows   = allReadings.map(item => {
    const flat        = allFlats.find(f => f.flatNumber === item.flatNumber);
    const name        = flat ? (flat.tenantName || flat.ownerName) : '';
    const phone       = flat ? (flat.tenantPhone || flat.ownerPhone) : '';
    const curr        = item.reading     || 0;
    const consumption = item.consumption || 0;
    const prev        = curr - consumption;
    const charges     = item.charges     || 0;
    return [item.flatNumber, `"${name}"`, phone, curr, prev, consumption, charges.toFixed(2)].join(',');
  });

  downloadFile([header.join(','), ...rows].join('\n'), `water-bill-${getCurrentMonthStr()}.csv`, 'text/csv');
  showToast('📥 CSV generated!', 'success');
}

// ══════════════════════════════════════════════════════
// FLATS — LOAD & RENDER
// ══════════════════════════════════════════════════════
async function loadFlats() {
  try {
    const res = await fetch(`${BASE_URL}/api/flats`);
    if (!res.ok) throw new Error('API error ' + res.status);
    allFlats = await res.json();
    renderFlats(allFlats);
    // Re-render readings now that we have flat info
    if (allReadings.length) renderReadings();
  } catch(e) {
    document.getElementById('flatsGrid').innerHTML =
      `<div class="loading" style="color:var(--danger)">⚠️ Could not load flats.</div>`;
  }
}

function renderFlats(flats) {
  document.getElementById('flatCount').textContent = `${flats.length} flat${flats.length !== 1 ? 's' : ''}`;
  const grid = document.getElementById('flatsGrid');
  grid.innerHTML = '';

  flats.forEach(flat => {
    const card = document.createElement('div');
    card.className = 'flat-card';
    card.dataset.flatNumber = flat.flatNumber;

    card.innerHTML = `
      <div class="flat-card-header">
        <span class="flat-number">${flat.flatNumber}</span>
        <span style="font-size:0.75rem;opacity:0.8">ID: ${flat.id}</span>
      </div>
      <div class="flat-card-body">
        <div class="flat-info-label">Owner</div>
        <div class="flat-info-row">👤 <strong>${flat.ownerName}</strong></div>
        <div class="flat-info-row">📞 ${flat.ownerPhone || '—'}</div>

        <div class="flat-info-label" style="margin-top:0.75rem">Tenant</div>
        <div class="tenant-edit-row">
          <input class="tenant-input" id="tname-${flat.flatNumber}"
                 placeholder="Tenant name"
                 value="${flat.tenantName || ''}" />
        </div>
        <div class="tenant-edit-row">
          <input class="tenant-input" id="tphone-${flat.flatNumber}"
                 placeholder="Tenant phone"
                 value="${flat.tenantPhone || ''}" />
          <button class="btn btn-success btn-sm" onclick="saveTenant('${flat.flatNumber}')">Save</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function filterFlats() {
  const q = document.getElementById('flatSearch').value.toLowerCase();
  const filtered = allFlats.filter(f =>
    f.flatNumber.toLowerCase().includes(q) ||
    f.ownerName.toLowerCase().includes(q) ||
    (f.tenantName && f.tenantName.toLowerCase().includes(q))
  );
  renderFlats(filtered);
}

async function saveTenant(flatNumber) {
  const name  = document.getElementById(`tname-${flatNumber}`).value.trim();
  const phone = document.getElementById(`tphone-${flatNumber}`).value.trim();

  try {
    const res = await fetch(`${BASE_URL}/api/flats/${flatNumber}/tenant`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tenantName: name || null, tenantPhone: phone || null })
    });
    if (!res.ok) throw new Error('Server error ' + res.status);
    const updated = await res.json();

    // Update local state
    const idx = allFlats.findIndex(f => f.flatNumber === flatNumber);
    if (idx !== -1) {
      allFlats[idx].tenantName  = updated.tenantName;
      allFlats[idx].tenantPhone = updated.tenantPhone;
    }

    showToast(`✅ Tenant updated for ${flatNumber}`, 'success');
    // Refresh readings display so name/phone reflects update
    renderReadings();
  } catch(e) {
    showToast('❌ Failed to update tenant: ' + e.message, 'danger');
  }
}

// ══════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════
function showToast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function downloadFile(content, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = filename;
  a.click();
}

function getCurrentMonthStr() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
}

function getDueDate() {
  const now  = new Date();
  const due  = new Date(now.getFullYear(), now.getMonth() + 1, 8);
  return due.toLocaleDateString('en-IN', { day:'2-digit', month:'2-digit', year:'numeric' }).replace(/\//g,'-');
}
